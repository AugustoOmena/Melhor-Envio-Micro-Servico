name: deploy

on:
  push:
    branches: ["main"]
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  test-and-deploy:
    runs-on: ubuntu-latest
    env:
      TF_IN_AUTOMATION: "true"
      TF_INPUT: "false"
      TF_VAR_aws_region: us-east-1
      TF_VAR_melhor_envio_client_id: ${{ secrets.MELHOR_ENVIO_CLIENT_ID }}
      TF_VAR_melhor_envio_client_secret: ${{ secrets.MELHOR_ENVIO_CLIENT_SECRET }}
      TF_VAR_supabase_url: ${{ secrets.TF_VAR_SUPABASE_URL }}
      TF_VAR_supabase_key: ${{ secrets.TF_VAR_SUPABASE_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies (test)
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -r requirements-dev.txt

      - name: Run unit tests
        run: pytest -q

      - name: Build Lambda artifacts
        run: ./scripts/build_lambdas.sh

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.5"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Terraform init
        working-directory: infra
        run: terraform init -upgrade

      - name: Terraform apply
        working-directory: infra
        run: terraform apply -auto-approve

