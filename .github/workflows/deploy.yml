name: deploy

on:
  push:
    branches: ["main", "develop"]
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  terraform:
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name == 'main' && 'production' || 'development' }}
    defaults:
      run:
        working-directory: infra

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.5"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Choose workspace name
        run: |
          if [ "${GITHUB_REF_NAME}" = "main" ]; then
            TF_WORKSPACE_NAME="prod"
          else
            TF_WORKSPACE_NAME="dev"
          fi
          echo "TF_WORKSPACE_NAME=${TF_WORKSPACE_NAME}" >> "${GITHUB_ENV}"

      - name: Terraform init
        run: terraform init

      - name: Terraform fmt
        run: terraform fmt -check

      - name: Terraform validate
        run: terraform validate

      - name: Terraform workspace select
        run: terraform workspace select -or-create "${TF_WORKSPACE_NAME}"

      - name: Terraform plan
        env:
          TF_VAR_melhor_envio_client_id: ${{ secrets.MELHOR_ENVIO_CLIENT_ID }}
          TF_VAR_melhor_envio_client_secret: ${{ secrets.MELHOR_ENVIO_CLIENT_SECRET }}
          TF_VAR_melhor_envio_default_scope: ${{ secrets.MELHOR_ENVIO_DEFAULT_SCOPE }}
        run: terraform plan -out=tfplan

      - name: Terraform apply
        env:
          TF_VAR_melhor_envio_client_id: ${{ secrets.MELHOR_ENVIO_CLIENT_ID }}
          TF_VAR_melhor_envio_client_secret: ${{ secrets.MELHOR_ENVIO_CLIENT_SECRET }}
          TF_VAR_melhor_envio_default_scope: ${{ secrets.MELHOR_ENVIO_DEFAULT_SCOPE }}
        run: terraform apply -auto-approve tfplan

