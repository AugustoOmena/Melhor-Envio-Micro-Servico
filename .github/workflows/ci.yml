name: ci

on:
  pull_request: {}
  push:
    branches: ["main"]

permissions:
  contents: read

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest "aws-lambda-powertools>=2.0" "aws-xray-sdk>=2.12" "requests>=2.31" "pydantic>=2.0"

      - name: Run tests
        run: pytest -q

